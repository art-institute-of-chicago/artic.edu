      - name: Clean up previous bot reviews
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const botLogin = 'github-actions[bot]';

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number }
            );

            for (const review of reviews) {
              if (review.user.login === botLogin && ['COMMENT', 'CHANGES_REQUESTED'].includes(review.state)) {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number,
                  review_id: review.id,
                  message: 'Superseded by updated analysis.'
                });
              }
            }

      - name: Post inline review comments
        id: post-review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            let parsed;
            try {
              parsed = JSON.parse(process.env.analysis);
            } catch (e) {
              core.warning('AI response was not valid JSON; falling back to raw output.');
              await github.rest.pulls.createReview({
                owner, repo, pull_number, commit_id,
                event: 'COMMENT',
                body: process.env.analysis
              });
              return;
            }

            const comments = (parsed.review_comments || []).map(c => ({
              path: c.path,
              line: c.line,
              side: 'RIGHT',
              body: c.body
            }));

            const event = comments.length > 0 ? 'REQUEST_CHANGES' : 'COMMENT';

            await github.rest.pulls.createReview({
              owner, repo, pull_number, commit_id,
              event,
              body: parsed.summary,
              comments
            });

            core.setOutput('has_comments', comments.length > 0);

      - name: React with result
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const reactions = await github.paginate(
              github.rest.reactions.listForIssue,
              { owner, repo, issue_number }
            );

            const eyesReaction = reactions.find(r =>
              r.content === 'eyes' && r.user.login === 'github-actions[bot]'
            );

            if (eyesReaction) {
              await github.rest.reactions.deleteForIssue({
                owner, repo, issue_number,
                reaction_id: eyesReaction.id
              });
            }

            const hasComments = ${{ steps.post-review.outputs.has_comments }};
            await github.rest.reactions.createForIssue({
              owner, repo, issue_number,
              content: hasComments ? 'rocket' : 'hooray'
            });
